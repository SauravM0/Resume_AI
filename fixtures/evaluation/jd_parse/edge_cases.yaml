pack_id: jd_parse_edge_cases
pack_type: jd_parse
description: |
  Edge case job descriptions for regression testing.
  Includes noisy, sparse, and ambiguous JDs.
version: "1.0.0"

cases:
  - case_id: EDGE-001-noisy-jd
    description: Noisy job description with lots of fluff
    pack_type: jd_parse
    
    job_description:
      raw_text: |
        🚀 JOIN OUR AMAZING TEAM! 🚀
        
        Are you passionate about technology? Do you want to work at an
        INNOVATIVE company that's DISRUPTING the industry?
        
        We're looking for SUPERSTAR developers who are passionate about
        building COOL stuff and making an IMPACT!
        
        You'll work with cutting-edge technologies and collaborate
        with an incredible team of rockstars!
        
        Requirements:
        - Experience with tech stuff
        - Know some programming languages
        - Be a team player
        
        This is an AMAZING opportunity! Apply NOW!
    tags:
      - noisy
      - edge_case
    
    phase1_expectations:
      expected_role_family: backend
      expected_seniority: mid
      
      expected_skills:
        - type: must_include
          value: programming
          match_mode: fuzzy
          weight: 0.8
      
      min_quality_score: 0.30
      min_parser_confidence: 0.30

  - case_id: EDGE-002-sparse-jd
    description: Very sparse job description
    pack_type: jd_parse
    
    job_description:
      raw_text: |
        Backend Developer
        
        Python. SQL. Remote.
    tags:
      - sparse
      - edge_case
    
    phase1_expectations:
      expected_role_family: backend
      expected_seniority: mid
      
      expected_skills:
        - type: must_include
          value: Python
          match_mode: exact
          weight: 1.0
        - type: must_include
          value: SQL
          match_mode: exact
          weight: 1.0
      
      min_quality_score: 0.25
      min_parser_confidence: 0.25

  - case_id: EDGE-003-generic-jd
    description: Generic "software engineer" JD
    pack_type: jd_parse
    
    job_description:
      raw_text: |
        Software Engineer
        
        We are hiring a software engineer to work on our products.
        
        Requirements:
        - 3+ years experience
        - Strong programming skills
        - CS degree or equivalent
        
        Responsibilities:
        - Write code
        - Test software
        - Work with team
    tags:
      - generic
      - edge_case
    
    phase1_expectations:
      expected_seniority: mid
      
      expected_skills:
        - type: must_include
          value: programming
          match_mode: fuzzy
          weight: 0.9
      
      min_quality_score: 0.40
      min_parser_confidence: 0.40