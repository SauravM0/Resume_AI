pack_id: gold_selection_v1
pack_type: selection
description: |
  Gold selection evaluation pack for hardening the Phase 2 deterministic selection engine.
  Tests 10 critical selection scenarios that define product quality: frontend/backend/fullstack,
  senior/entry-level, project-heavy/stale/weak-fit/compression/gap-fill cases.
  Success requires matching relevant experiences, filtering stale content, supporting skills with evidence,
  and compressing intelligently for one-page output.
version: "1.0.0"

cases:
  - case_id: GOLD-FE-001-frontend-senior-react
    description: Senior frontend role should select React/TypeScript experience and exclude old jQuery work
    pack_type: selection
    job_description:
      raw_text: |
        Senior Frontend Engineer
        
        Requirements:
        - 5+ years React and TypeScript experience
        - Component architecture and state management (Redux, Zustand)
        - Modern CSS (Tailwind, styled-components)
        - Performance optimization
        - Testing (Jest, Cypress)
        
        Responsibilities:
        - Build and maintain React components
        - Optimize application performance
        - Mentor junior developers
    profile:
      path: profiles/frontend_modern.json
      summary: Strong React/TypeScript profile with old jQuery work that should be excluded
    phase1_expectations:
      expected_role_family: frontend
      expected_seniority: senior
    selection_expectations:
      experience_expectations:
        - type: must_include
          value: Senior Frontend Engineer @ TechFlow
          reason: Most relevant recent frontend experience with React/TypeScript
        - type: must_include
          value: Frontend Developer @ WebAgency
          reason: Adds frontend breadth and modern React evidence
        - type: must_not_include
          value: Junior Web Dev @ OldCorp
          reason: Old jQuery work dilutes the React narrative
      project_expectations:
        - type: must_include
          value: E-commerce Redesign
          reason: Strong modern React project evidence
        - type: must_not_include
          value: Legacy Site Update
          reason: Old HTML/CSS project does not add value
      bullet_expectations:
        - type: must_include
          value: React 18 with TypeScript
          match_mode: fuzzy
        - type: must_include
          value: component library
          match_mode: fuzzy
        - type: must_include
          value: 85% code coverage
          match_mode: fuzzy
        - type: must_not_include
          value: jQuery admin
          match_mode: fuzzy
      skill_expectations:
        - type: must_include
          value: React
        - type: must_include
          value: TypeScript
        - type: must_include
          value: Jest
        - type: must_not_include
          value: jQuery
      min_selection_relevance: 0.65
      min_diversity_balance: 0.50

